name: Generate Snake

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: VivekBGautam

          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=#00FF41&color_dots=#161b22,#1f2d1f,#2f6f3e,#00c853,#39FF14
            dist/github-contribution-grid-snake.svg?color_snake=#008f11&color_dots=#ebedf0,#d6e685,#8cc665,#44a340,#1e6823

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
